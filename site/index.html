<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法典图鉴 · NovelAI 提示词</title>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<header class="topbar">
  <button id="menuBtn" class="icon-btn" title="目录">☰</button>
  <div class="brand">法典<span>图鉴</span></div>

  <label class="codex-pick">
    <select id="codexSelect"></select>
  </label>

  <div class="search-wrap">
    <span class="search-ico">🔍</span>
    <input id="search" type="search" placeholder="搜索词条或 tag（中 / 英）…" autocomplete="off">
  </div>

  <label class="toggle" title="只显示已配图的词条">
    <input type="checkbox" id="onlyImaged"><span>只看有图</span>
  </label>
  <a class="icon-btn" href="https://github.com/AgIzT/NovelAI-Tag" target="_blank" rel="noopener" title="GitHub 仓库" aria-label="GitHub">
    <svg viewBox="0 0 16 16" width="19" height="19" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82A7.65 7.65 0 018 4.58c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
  </a>
  <button id="themeBtn" class="icon-btn" title="深色 / 浅色">🌙</button>
</header>

<div class="layout">
  <aside id="sidebar" class="sidebar">
    <div class="sb-head">
      <span id="codexTitle" class="codex-title"></span>
      <span id="codexMeta" class="codex-meta"></span>
    </div>
    <nav id="tree" class="tree"></nav>
  </aside>

  <main class="main" id="main">
    <div class="result-bar"><span id="resultInfo"></span></div>
    <div id="masonry" class="masonry"></div>
    <div id="sentinel" class="sentinel"></div>
    <div id="empty" class="empty" hidden>这里还没有词条</div>
  </main>
</div>

<div id="toast" class="toast"></div>

<div id="lightbox" class="lightbox" hidden>
  <img id="lightboxImg" alt="例图">
</div>

<template id="cardTpl">
  <article class="card">
    <div class="card-img-wrap" hidden>
      <img class="card-img" loading="lazy" alt="">
      <button class="zoom-btn" title="放大查看">🔍</button>
    </div>
    <div class="card-body">
      <div class="card-title-row">
        <h3 class="card-title"></h3>
        <span class="badge-new" hidden>NEW</span>
      </div>
      <div class="card-tags"></div>
      <div class="card-foot">
        <span class="card-path"></span>
        <span class="copy-hint">📋 点击复制</span>
      </div>
    </div>
  </article>
</template>

<script src="assets/app.js"></script>
</body>
</html>
