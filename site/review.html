<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>共创广场后台</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<script>
/* 主题早应用：跟随法典图鉴；仅在新键缺失时兼容旧审核页 strings-dark。 */
(()=>{try{
  const storedDark=localStorage.getItem('fadian-dark');
  const legacyDark=localStorage.getItem('strings-dark');
  const dark=storedDark==='1'||(storedDark===null&&legacyDark==='true');
  const storedTheme=localStorage.getItem('fadian-theme');
  const theme=['teal','sakura','amber'].includes(storedTheme)?storedTheme:'';
  window.__adminTheme={dark,theme};
  document.documentElement.style.colorScheme=dark?'dark':'light';
}catch(e){window.__adminTheme={dark:false,theme:''}}})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="assets/tokens.css">
<link rel="stylesheet" href="assets/admin.css">
</head>
<body>
<script>
(()=>{const t=window.__adminTheme||{};document.body.classList.toggle('dark',!!t.dark);if(t.theme)document.body.classList.add('theme-'+t.theme)})();
</script>
<header class="admin-topbar">
  <a class="admin-brand" href="/strings.html">
    <span class="brand-mark" aria-hidden="true">共</span>
    <span class="brand-copy">
      <b>共创广场后台</b>
      <small>审核工作台</small>
    </span>
  </a>
  <label class="top-search" for="globalSearch">
    <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.6-3.6"></path></svg>
    <span class="sr-only">搜索投稿</span>
    <input id="globalSearch" type="search" placeholder="搜索标题、Prompt、标签或投稿人" autocomplete="off">
    <kbd>/</kbd>
  </label>
  <div class="top-actions">
    <button class="icon-action theme-toggle" type="button" id="themeBtn" aria-label="切换深浅色" title="切换深浅色">
      <svg class="sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path></svg>
      <svg class="moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"></path></svg>
    </button>
    <button class="icon-action" type="button" id="reloadBtn" hidden title="刷新当前队列">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11a8 8 0 1 0-2.34 5.66"></path><path d="M20 4v7h-7"></path></svg>
      <span>刷新</span>
    </button>
    <button class="icon-action" type="button" id="logoutBtn" hidden title="退出后台">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 17l5-5-5-5M15 12H3"></path><path d="M14 3h5a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-5"></path></svg>
      <span>退出</span>
    </button>
  </div>
</header>

<section class="login-card" id="login" hidden>
  <h1>管理口令</h1>
  <p>输入 Cloudflare Pages 环境变量 <code>ADMIN_TOKEN</code> 设置的口令。</p>
  <input type="password" id="tokenInput" placeholder="口令" autocomplete="current-password">
  <button class="primary-btn" id="loginBtn" type="button">进入后台</button>
  <div class="form-error" id="loginErr"></div>
</section>

<main class="admin-shell" id="app" hidden>
  <aside class="admin-nav" aria-label="后台导航">
    <div class="nav-heading">
      <span>工作台</span>
      <small>Workspace</small>
    </div>
    <button class="nav-item on" type="button" data-view="dashboard">
      <span class="nav-leading"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 13h6V4H4v9Zm10 7h6V11h-6v9ZM4 20h6v-3H4v3Zm10-13h6V4h-6v3Z"></path></svg><span>总览</span></span><b id="navDashCount">-</b>
    </button>
    <button class="nav-item" type="button" data-view="content">
      <span class="nav-leading"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 11 11 13 15.5 8.5"></path><path d="M6 3h12a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z"></path></svg><span>投稿内容</span></span><b id="navPendingCount">0</b>
    </button>
    <button class="nav-item" type="button" data-view="feedback">
      <span class="nav-leading"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4v8Z"></path><path d="M8 9h8M8 13h5"></path></svg><span>反馈处理</span></span><b id="navFeedbackCount">0</b>
    </button>
    <a class="nav-community-link" href="/strings.html">
      <span>打开共创广场</span><span aria-hidden="true">↗</span>
    </a>
  </aside>

  <section class="admin-main">
    <div class="view-head">
      <div>
        <p class="eyebrow" id="viewKicker">Dashboard</p>
        <h1 id="viewTitle">总览</h1>
      </div>
      <div class="view-meta" id="viewMeta"></div>
    </div>
    <div id="dashboardPanel" class="dashboard-panel"></div>
    <div id="toolbar" class="toolbar"></div>
    <div id="list" class="admin-list"></div>
    <div class="empty-state" id="empty" hidden>暂无内容</div>
  </section>

  <aside class="detail-panel" id="detail" aria-label="内容详情" aria-live="polite">
    <div class="detail-empty">
      <b>选择一条内容</b>
      <span>右侧会显示完整信息、编辑表单和管理动作。</span>
    </div>
  </aside>
</main>

<button class="detail-backdrop" type="button" data-detail-close aria-label="关闭详情"></button>
<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script type="module" src="assets/admin.js"></script>
</body>
</html>
