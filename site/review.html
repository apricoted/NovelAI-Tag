<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>共创广场后台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="assets/tokens.css">
<link rel="stylesheet" href="assets/admin.css">
<script>
try {
  if (localStorage.getItem('strings-dark') === 'true') {
    document.documentElement.classList.add('dark');
    document.addEventListener('DOMContentLoaded', () => document.body.classList.add('dark'));
  }
} catch {}
</script>
</head>
<body>
<header class="admin-topbar">
  <a class="admin-brand" href="/strings.html">
    <span class="brand-mark">共</span>
    <span>
      <b>共创广场后台</b>
      <small>审核 · 管理 · 反馈</small>
    </span>
  </a>
  <label class="top-search" for="globalSearch">
    <span>搜索</span>
    <input id="globalSearch" type="search" placeholder="标题、prompt、标签、投稿人">
  </label>
  <div class="top-actions">
    <button class="ghost-btn" type="button" id="themeBtn">深/浅色</button>
    <button class="ghost-btn" type="button" id="reloadBtn" hidden>刷新</button>
    <button class="ghost-btn" type="button" id="logoutBtn" hidden>退出</button>
  </div>
</header>

<section class="login-card" id="login" hidden>
  <h1>管理口令</h1>
  <p>输入 Cloudflare Pages 环境变量 <code>ADMIN_TOKEN</code> 设置的口令。</p>
  <input type="password" id="tokenInput" placeholder="口令" autocomplete="current-password">
  <button class="primary-btn" id="loginBtn" type="button">进入后台</button>
  <div class="form-error" id="loginErr"></div>
</section>

<main class="admin-shell" id="app" hidden>
  <aside class="admin-nav" aria-label="后台导航">
    <button class="nav-item on" type="button" data-view="dashboard">
      <span>总览</span><b id="navDashCount">-</b>
    </button>
    <button class="nav-item" type="button" data-view="review">
      <span>投稿审核</span><b id="navPendingCount">0</b>
    </button>
    <button class="nav-item" type="button" data-view="content">
      <span>内容管理</span><b id="navContentCount">0</b>
    </button>
    <button class="nav-item" type="button" data-view="feedback">
      <span>反馈处理</span><b id="navFeedbackCount">0</b>
    </button>
  </aside>

  <section class="admin-main">
    <div class="view-head">
      <div>
        <p class="eyebrow" id="viewKicker">Dashboard</p>
        <h1 id="viewTitle">总览</h1>
      </div>
      <div class="view-meta" id="viewMeta"></div>
    </div>
    <div id="dashboardPanel" class="dashboard-panel"></div>
    <div id="toolbar" class="toolbar"></div>
    <div id="list" class="admin-list"></div>
    <div class="empty-state" id="empty" hidden>暂无内容</div>
  </section>

  <aside class="detail-panel" id="detail">
    <div class="detail-empty">
      <b>选择一条内容</b>
      <span>右侧会显示完整信息、编辑表单和管理动作。</span>
    </div>
  </aside>
</main>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script type="module" src="assets/admin.js"></script>
</body>
</html>
