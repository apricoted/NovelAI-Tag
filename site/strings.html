<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>共创广场 · 法典图鉴</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<script>/* 跨页 View Transition 抵达打标：vt-arrived 永久关掉入场编排避免叠影；vt-live 只活到过渡结束 */
addEventListener('pagereveal',e=>{if(e.viewTransition){const h=document.documentElement;h.classList.add('vt-arrived','vt-live');e.viewTransition.finished.finally(()=>h.classList.remove('vt-live'))}},{once:true});
if('scrollRestoration' in history)history.scrollRestoration='manual';</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;500;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap">
<link rel="stylesheet" href="assets/tokens.css">
<link rel="stylesheet" href="assets/community.css">
<link rel="modulepreload" href="assets/community/constants.js">
<link rel="modulepreload" href="assets/community/state.js">
<link rel="modulepreload" href="assets/community/utils.js">
<link rel="modulepreload" href="assets/community/api.js">
<link rel="modulepreload" href="assets/community/demo.js">
<link rel="modulepreload" href="assets/community/favorites.js">
<link rel="modulepreload" href="assets/community/render.js">
<link rel="modulepreload" href="assets/community/detail.js">
<link rel="modulepreload" href="assets/community/submit.js">
<link rel="modulepreload" href="assets/community/png-metadata.js">
<link rel="modulepreload" href="assets/community/ui.js">
<link rel="modulepreload" href="assets/app/modal.js">
<link rel="modulepreload" href="assets/app/feedback.js">
<link rel="modulepreload" href="assets/app/utils.js">
</head>
<body>
<script>/* 主题早应用：和主站使用同一 localStorage 键，避免共创广场单独漂移 */
(()=>{try{
  const c=document.body.classList;
  if(localStorage.getItem('fadian-dark')==='1'){c.add('dark');document.documentElement.style.colorScheme='dark';}
  const t=localStorage.getItem('fadian-theme');
  if(t==='teal'||t==='sakura'||t==='amber')c.add('theme-'+t);
  const d=localStorage.getItem('fadian-density');
  if(d==='comfort'||d==='standard'||d==='compact')c.add('density-'+d);
}catch(e){}})();</script>

<div id="scrollProgress" class="scroll-progress" aria-hidden="true"></div>

<header class="topbar">
  <div class="brand">共创<span>广场</span></div>
  <a class="home-link" href="/index.html" aria-label="返回法典图鉴">← <span>法典图鉴</span></a>
  <div class="topbar-actions">
    <button id="submitOpenBtn" class="submit-top-btn" type="button" data-open-submit title="分享你的作品">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
      <span>投稿</span>
    </button>
    <button id="favFilterBtn" class="icon-btn fav-filter-btn" type="button" aria-pressed="false" title="收藏">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 3.8 2.45 4.96 5.48.8-3.96 3.86.94 5.46L12 16.3l-4.9 2.58.93-5.46-3.96-3.86 5.48-.8L12 3.8Z"/></svg>
    </button>
    <button id="nsfwBtn" class="icon-btn nsfw-btn" type="button" aria-pressed="false" title="NSFW 已隐藏">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path class="nsfw-shield" d="M12 3.2 19 6v5.2c0 4.2-2.7 7.5-7 9.6-4.3-2.1-7-5.4-7-9.6V6l7-2.8Z"/><path class="nsfw-cut" d="m8.2 15.8 7.6-7.6"/><path class="nsfw-eye" d="M8 12s1.5-2.6 4-2.6 4 2.6 4 2.6-1.5 2.6-4 2.6S8 12 8 12Z"/><circle class="nsfw-dot" cx="12" cy="12" r="1.1"/></svg>
    </button>
    <button id="themeBtn" class="icon-btn theme-btn" type="button" title="深色 / 浅色" aria-label="切换深浅色">
      <svg class="sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <svg class="moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>
    </button>
  </div>
</header>

<main id="communityMain" class="community-main">
  <section class="community-hero" aria-labelledby="communityTitle">
    <div class="hero-copy">
      <h1 id="communityTitle">共创广场</h1>
      <p>分享任意 NovelAI 作品。<br>画风、人物、服装、动作、构图、场景，或者只是今天最喜欢的一张图。</p>
      <div class="hero-actions">
        <button class="primary-btn" type="button" data-open-submit>
          <span aria-hidden="true">＋</span>
          分享你的作品
        </button>
        <button class="ghost-btn" type="button" data-focus-search>
          浏览投稿
        </button>
        <span id="communityCount" class="result-bar">正在加载…</span>
      </div>
    </div>
    <div class="hero-panel" aria-hidden="true">
      <div class="hero-image"></div>
      <div class="hero-lines"><i></i><i></i><i></i></div>
    </div>
  </section>

  <section class="gallery-shell" aria-label="共创广场投稿">
    <div class="gallery-toolbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.8-3.8"/></svg>
        <input id="search" type="search" placeholder="搜索标题、tag、prompt…" autocomplete="off">
        <button id="searchClear" class="search-clear" type="button" aria-label="清空搜索" hidden>×</button>
      </div>
      <div id="categoryRail" class="category-rail" aria-label="分类筛选"></div>
    </div>

    <div id="resultInfo" class="result-bar">正在加载共创广场…</div>

    <button class="submit-inline" type="button" data-open-submit>
      <span class="plus" aria-hidden="true">＋</span>
      分享你的作品
    </button>

    <div id="communityGrid" class="community-grid" aria-live="polite"></div>
    <div id="empty" class="empty" hidden></div>
  </section>
</main>

<div id="detailMask" class="community-mask" role="dialog" aria-modal="true" aria-label="投稿详情" hidden>
  <div id="detailBody" class="dialog-panel"></div>
</div>

<div id="submitMask" class="community-mask" role="dialog" aria-modal="true" aria-labelledby="submitTitle" hidden>
  <form id="submitForm" class="dialog-panel submit-panel">
    <button class="dialog-close" type="button" data-close-submit aria-label="关闭投稿弹窗">×</button>
    <h2 id="submitTitle">投稿到共创广场</h2>
    <p class="submit-intro">拖入作品，粘贴 prompt，选择最贴近的内容类型。</p>

    <div class="sub-field">
      <label>作品 *</label>
      <div id="subDrop" class="sub-drop" role="button" tabindex="0">
        <div>
          <strong>拖入图片，或点击选择</strong>
          <span>1-6 张；PNG 原图若含参数会自动读取 Prompt</span>
        </div>
      </div>
      <input id="subFile" type="file" accept="image/*" multiple hidden>
      <div id="subPreviews" class="sub-previews"></div>
    </div>

    <div class="sub-field">
      <div class="sub-label-row">
        <label for="subPrompt">Prompt * <span id="subPromptSrc" class="sub-source sub-source-manual">手动填写</span></label>
        <label class="sub-inline-check"><input id="subNsfw" type="checkbox">包含 NSFW 内容</label>
      </div>
      <textarea id="subPrompt" class="mono" maxlength="2000" required placeholder="artist:xxx, cinematic lighting, dynamic pose, ..."></textarea>
    </div>

    <div class="sub-field">
      <label>分类</label>
      <div id="subCategoryList" class="sub-cat-list"></div>
      <input id="subCategory" type="hidden" value="随手分享">
    </div>

    <div class="sub-row">
      <div class="sub-field">
        <label for="subTitle">标题</label>
        <input id="subTitle" type="text" maxlength="60" placeholder="不填会自动生成">
      </div>
      <div class="sub-field">
        <label for="subName">投稿者名</label>
        <input id="subName" type="text" maxlength="20" placeholder="匿名">
      </div>
    </div>

    <details id="subMore" class="sub-more">
      <summary>更多（可选）<span>负面 prompt · 说明 · 标签</span></summary>
      <div class="sub-more-body">
        <div class="sub-field">
          <label for="subNegative">负面 Prompt</label>
          <textarea id="subNegative" class="mono" maxlength="2000" placeholder="lowres, bad anatomy, extra fingers, ..."></textarea>
        </div>
        <div class="sub-field">
          <label for="subComment">说明</label>
          <textarea id="subComment" maxlength="500" placeholder="适合什么题材、推荐权重等"></textarea>
        </div>
        <div class="sub-field">
          <label for="subTags">标签</label>
          <input id="subTags" type="text" maxlength="200" placeholder="暗色, 油画, 高对比">
        </div>
      </div>
    </details>

    <div class="sub-actions">
      <button id="subGo" type="submit">提交投稿</button>
      <div id="subErr" class="sub-err" aria-live="polite"></div>
    </div>
  </form>
</div>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script type="module" src="assets/community.js"></script>
</body>
</html>
